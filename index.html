<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista Zadań do Wykonania</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Lista Zadań</h1>
            <p>Zarządzaj swoimi codziennymi obowiązkami. Dodawaj, edytuj i usuwaj zadania według własnych potrzeb.</p>
        </header>

        <div id="alert-message" class="alert hidden"></div>

        <main>
            <section class="form-section">
                <h2 id="form-title">Dodaj nowe zadanie</h2>
                <form id="task-form">
                    <input type="hidden" id="task-id">
                    
                    <div class="form-group">
                        <label for="task-title">Tytuł zadania *</label>
                        <input type="text" id="task-title" placeholder="np. Zrobić zakupy spożywcze">
                    </div>

                    <div class="form-group">
                        <label for="task-desc">Opis</label>
                        <textarea id="task-desc" rows="3" placeholder="Wpisz szczegóły zadania..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="task-priority">Priorytet *</label>
                        <select id="task-priority">
                            <option value="Niski">Niski</option>
                            <option value="Średni" selected>Średni</option>
                            <option value="Wysoki">Wysoki</option>
                        </select>
                    </div>

                    <button type="submit" id="submit-btn" class="btn-primary">Dodaj zadanie</button>
                    <button type="button" id="cancel-btn" class="btn-secondary hidden">Anuluj edycję</button>
                </form>
            </section>

            <section class="list-section">
                <h2>Twoje zadania</h2>
                <div id="task-list" class="task-list">
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
